<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>やまかわOS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .hidden {
            display: none !important;
        }

        #login-screen {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: 300px;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        #login-btn {
            width: 100%;
            padding: 10px;
            background-color: #0078d7;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #login-btn:hover {
            background-color: #005a9e;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 10px;
        }

        #desktop-screen {
            background: #0078d7;
            background-image: radial-gradient(circle, #0084f1 0%, #005a9e 100%);
        }

        .desktop-icons {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .icon {
            width: 75px;
            text-align: center;
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .icon-img {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .icon-text {
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .window {
            position: absolute;
            background: white;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 200px;
            min-height: 150px;
            touch-action: none;
        }

        .window-header {
            background: #f3f3f3;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dcdcdc;
            cursor: move;
        }

        .window-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .window-close {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
            padding: 4px 8px;
        }

        .window-close:hover {
            background: #e81123;
            color: white;
            border-radius: 3px;
        }

        .window-body {
            flex: 1;
            position: relative;
        }

        .window-body textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            padding: 10px;
            font-size: 14px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        .window-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 24px;
            height: 24px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 60%, #999 60%);
            z-index: 10;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
        }

        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 5;
        }

        .browser-toolbar {
            display: flex;
            background: #f3f3f3;
            padding: 5px;
            gap: 5px;
            border-bottom: 1px solid #dcdcdc;
        }

        .browser-toolbar button {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
        }

        .browser-toolbar button:hover {
            background: #f0f0f0;
        }

        .browser-toolbar input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        .player-container {
            padding: 15px;
            background: #f9f9f9;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .player-info {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .player-file {
            font-size: 11px;
            color: #888;
        }

        .player-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .player-btn {
            padding: 6px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .player-btn:hover {
            background: #f0f0f0;
        }

        .player-vol {
            width: 60px;
            cursor: pointer;
        }

        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(16, 16, 16, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            z-index: 9999;
        }

        #start-btn {
            background: #0078d7;
            color: white;
            border: none;
            padding: 6px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        #start-btn:hover {
            background: #005a9e;
        }

        .taskbar-time {
            color: white;
            font-size: 14px;
        }

        .start-menu {
            position: absolute;
            bottom: 45px;
            left: 5px;
            width: 200px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9998;
        }

        .start-menu button {
            width: 100%;
            background: none;
            border: none;
            color: white;
            text-align: left;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .start-menu button:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>やまかわOS</h2>
            <div class="input-group">
                <label for="username">ユーザー名:</label>
                <input type="text" id="username" value="user" readonly>
            </div>
            <div class="input-group">
                <label for="password">パスワード:</label>
                <input type="password" id="password" placeholder="パスワードを入力">
            </div>
            <button id="login-btn">ログイン</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <div id="desktop-screen" class="screen hidden">
        <div class="desktop-icons">
            <div class="icon" id="notepad-icon">
                <div class="icon-img">📝</div>
                <div class="icon-text">メモ帳</div>
            </div>
            <div class="icon" id="browser-icon">
                <div class="icon-img">🌐</div>
                <div class="icon-text">ブラウザ</div>
            </div>
            <div class="icon" id="player-icon">
                <div class="icon-img">🎵</div>
                <div class="icon-text">音源再生</div>
            </div>
        </div>

        <div id="notepad-window" class="window hidden" style="width: 300px; height: 250px; top: 80px; left: 20px;">
            <div class="window-header">
                <span class="window-title">メモ帳</span>
                <button class="window-close" id="close-notepad">✕</button>
            </div>
            <div class="window-body">
                <textarea id="notepad-text" placeholder="ここに文字を入力してください..."></textarea>
                <div class="window-resize-handle"></div>
            </div>
        </div>

        <div id="browser-window" class="window hidden" style="width: 340px; height: 400px; top: 40px; left: 40px;">
            <div class="window-header">
                <span class="window-title">やまかわブラウザ</span>
                <button class="window-close" id="close-browser">✕</button>
            </div>
            <div class="browser-toolbar">
                <button id="browser-back">←</button>
                <input type="text" id="browser-url" value="https://www.youtube.com/@YamakawaTeruki">
                <button id="browser-go">移動</button>
            </div>
            <div class="window-body" style="background: white;">
                <div class="iframe-container">
                    <div class="iframe-overlay" id="browser-overlay"></div>
                    <iframe id="browser-iframe" style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
                <div class="window-resize-handle"></div>
            </div>
        </div>

        <div id="player-window" class="window hidden" style="width: 330px; height: 340px; top: 120px; left: 30px;">
            <div class="window-header">
                <span class="window-title">サウンドプレーヤー</span>
                <button class="window-close" id="close-player">✕</button>
            </div>
            <div class="window-body">
                <div class="player-container">
                    <div class="player-row">
                        <div class="player-info">
                            <span class="player-name">起動音</span>
                            <span class="player-file">startup.mp3</span>
                        </div>
                        <div class="player-controls">
                            <button class="player-btn" onclick="controlAudio('snd-startup', 'play')">▶</button>
                            <button class="player-btn" onclick="controlAudio('snd-startup', 'stop')">■</button>
                            <input type="range" class="player-vol" min="0" max="1" step="0.1" value="1" oninput="setAudioVolume('snd-startup', this.value)">
                        </div>
                    </div>
                    <div class="player-row">
                        <div class="player-info">
                            <span class="player-name">クリック音</span>
                            <span class="player-file">click.mp3</span>
                        </div>
                        <div class="player-controls">
                            <button class="player-btn" onclick="controlAudio('snd-click', 'play')">▶</button>
                            <button class="player-btn" onclick="controlAudio('snd-click', 'stop')">■</button>
                            <input type="range" class="player-vol" min="0" max="1" step="0.1" value="1" oninput="setAudioVolume('snd-click', this.value)">
                        </div>
                    </div>
                    <div class="player-row">
                        <div class="player-info">
                            <span class="player-name">エラー音</span>
                            <span class="player-file">error.mp3</span>
                        </div>
                        <div class="player-controls">
                            <button class="player-btn" onclick="controlAudio('snd-error', 'play')">▶</button>
                            <button class="player-btn" onclick="controlAudio('snd-error', 'stop')">■</button>
                            <input type="range" class="player-vol" min="0" max="1" step="0.1" value="1" oninput="setAudioVolume('snd-error', this.value)">
                        </div>
                    </div>
                    <div class="player-row">
                        <div class="player-info">
                            <span class="player-name">終了音</span>
                            <span class="player-file">shutdown.mp3</span>
                        </div>
                        <div class="player-controls">
                            <button class="player-btn" onclick="controlAudio('snd-shutdown', 'play')">▶</button>
                            <button class="player-btn" onclick="controlAudio('snd-shutdown', 'stop')">■</button>
                            <input type="range" class="player-vol" min="0" max="1" step="0.1" value="1" oninput="setAudioVolume('snd-shutdown', this.value)">
                        </div>
                    </div>
                </div>
                <div class="window-resize-handle"></div>
            </div>
        </div>

        <div class="taskbar">
            <button id="start-btn">スタート</button>
            <div class="taskbar-time" id="taskbar-time">00:00</div>
        </div>

        <div id="start-menu" class="start-menu hidden">
            <button id="menu-notepad">📝 メモ帳</button>
            <button id="menu-browser">🌐 ブラウザ</button>
            <button id="menu-player">🎵 サウンドプレーヤー</button>
            <hr style="border: 0; border-top: 1px solid #444; margin: 5px 0;">
            <button id="shutdown-btn">🔴 シャットダウン</button>
        </div>
    </div>

    <audio id="snd-startup" src="./startup.mp3"></audio>
    <audio id="snd-click" src="./click.mp3"></audio>
    <audio id="snd-shutdown" src="./shutdown.mp3"></audio>
    <audio id="snd-error" src="./error.mp3"></audio>

    <script>
        const loginScreen = document.getElementById('login-screen');
        const desktopScreen = document.getElementById('desktop-screen');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        
        const notepadIcon = document.getElementById('notepad-icon');
        const notepadWindow = document.getElementById('notepad-window');
        const closeNotepad = document.getElementById('close-notepad');
        
        const browserIcon = document.getElementById('browser-icon');
        const browserWindow = document.getElementById('browser-window');
        const closeBrowser = document.getElementById('close-browser');
        const browserUrl = document.getElementById('browser-url');
        const browserGo = document.getElementById('browser-go');
        const browserBack = document.getElementById('browser-back');
        const browserIframe = document.getElementById('browser-iframe');
        const browserOverlay = document.getElementById('browser-overlay');

        const playerIcon = document.getElementById('player-icon');
        const playerWindow = document.getElementById('player-window');
        const closePlayer = document.getElementById('close-player');
        
        const startBtn = document.getElementById('start-btn');
        const startMenu = document.getElementById('start-menu');
        const shutdownBtn = document.getElementById('shutdown-btn');
        const menuNotepad = document.getElementById('menu-notepad');
        const menuBrowser = document.getElementById('menu-browser');
        const menuPlayer = document.getElementById('menu-player');
        
        const timeDisplay = document.getElementById('taskbar-time');
        
        const sndStartup = document.getElementById('snd-startup');
        const sndClick = document.getElementById('snd-click');
        const sndShutdown = document.getElementById('snd-shutdown');
        const sndError = document.getElementById('snd-error');

        const defaultUrl = "https://www.youtube.com/@YamakawaTeruki";
        const proxyApi = "https://yamakawaospreview.system322940-dev.workers.dev/?url=";

        let activeWindow = null;
        let isDragging = false;
        let isResizing = false;
        let startX, startY, startLeft, startTop, startWidth, startHeight;
        let zIndexCounter = 100;

        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON' && !e.target.classList.contains('player-vol')) {
                playAudio(sndClick);
            }
        });

        function playAudio(audioElement) {
            audioElement.currentTime = 0;
            audioElement.play().catch(err => console.log(err));
        }

        function controlAudio(id, action) {
            const audio = document.getElementById(id);
            if (action === 'play') {
                audio.currentTime = 0;
                audio.play().catch(err => console.log(err));
            } else if (action === 'stop') {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        function setAudioVolume(id, vol) {
            const audio = document.getElementById(id);
            audio.volume = vol;
        }

        function bringToFront(windowElement) {
            zIndexCounter++;
            windowElement.style.zIndex = zIndexCounter;
        }

        function getEventX(e) {
            return e.touches ? e.touches[0].clientX : e.clientX;
        }

        function getEventY(e) {
            return e.touches ? e.touches[0].clientY : e.clientY;
        }

        document.querySelectorAll('.window').forEach(win => {
            win.addEventListener('mousedown', () => bringToFront(win));
            win.addEventListener('touchstart', () => bringToFront(win));

            const header = win.querySelector('.window-header');
            
            const onDragStart = (e) => {
                if (e.target.classList.contains('window-close') || e.target.tagName === 'BUTTON') return;
                isDragging = true;
                activeWindow = win;
                startX = getEventX(e);
                startY = getEventY(e);
                startLeft = parseInt(window.getComputedStyle(win).left, 10) || 0;
                startTop = parseInt(window.getComputedStyle(win).top, 10) || 0;
                browserOverlay.style.display = 'block';
                if (!e.touches) e.preventDefault();
            };
            header.addEventListener('mousedown', onDragStart);
            header.addEventListener('touchstart', onDragStart, {passive: true});

            const handle = win.querySelector('.window-resize-handle');
            const onResizeStart = (e) => {
                isResizing = true;
                activeWindow = win;
                startX = getEventX(e);
                startY = getEventY(e);
                startWidth = parseInt(window.getComputedStyle(win).width, 10);
                startHeight = parseInt(window.getComputedStyle(win).height, 10);
                browserOverlay.style.display = 'block';
                if (!e.touches) e.preventDefault();
                e.stopPropagation();
            };
            handle.addEventListener('mousedown', onResizeStart);
            handle.addEventListener('touchstart', onResizeStart, {passive: true});
        });

        const onMove = (e) => {
            if (!activeWindow) return;

            const currentX = getEventX(e);
            const currentY = getEventY(e);

            if (isDragging) {
                const dx = currentX - startX;
                const dy = currentY - startY;
                activeWindow.style.left = (startLeft + dx) + 'px';
                activeWindow.style.top = (startTop + dy) + 'px';
            }

            if (isResizing) {
                const dx = currentX - startX;
                const dy = currentY - startY;
                activeWindow.style.width = Math.max(200, startWidth + dx) + 'px';
                activeWindow.style.height = Math.max(150, startHeight + dy) + 'px';
            }
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});

        const onEnd = () => {
            isDragging = false;
            isResizing = false;
            activeWindow = null;
            browserOverlay.style.display = 'none';
        };

        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchend', onEnd);

        loginBtn.addEventListener('click', () => {
            if (passwordInput.value === 'yamakawa') {
                playAudio(sndStartup);
                loginScreen.classList.add('hidden');
                desktopScreen.classList.remove('hidden');
            } else {
                playAudio(sndError);
                loginError.textContent = 'パスワードが間違っています。';
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        notepadIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            notepadWindow.classList.remove('hidden');
            bringToFront(notepadWindow);
        });
        closeNotepad.addEventListener('click', () => notepadWindow.classList.add('hidden'));
        menuNotepad.addEventListener('click', () => {
            notepadWindow.classList.remove('hidden');
            bringToFront(notepadWindow);
            startMenu.classList.add('hidden');
        });

        browserIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            browserWindow.classList.remove('hidden');
            bringToFront(browserWindow);
            if (!browserIframe.src) loadUrl(defaultUrl);
        });
        closeBrowser.addEventListener('click', () => browserWindow.classList.add('hidden'));
        menuBrowser.addEventListener('click', () => {
            browserWindow.classList.remove('hidden');
            bringToFront(browserWindow);
            if (!browserIframe.src) loadUrl(defaultUrl);
            startMenu.classList.add('hidden');
        });

        playerIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            playerWindow.classList.remove('hidden');
            bringToFront(playerWindow);
        });
        closePlayer.addEventListener('click', () => playerWindow.classList.add('hidden'));
        menuPlayer.addEventListener('click', () => {
            playerWindow.classList.remove('hidden');
            bringToFront(playerWindow);
            startMenu.classList.add('hidden');
        });

        function loadUrl(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            browserUrl.value = url;
            browserIframe.src = proxyApi + encodeURIComponent(url);
        }

        browserGo.addEventListener('click', () => loadUrl(browserUrl.value.trim()));
        browserUrl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUrl(browserUrl.value.trim());
        });
        browserBack.addEventListener('click', () => loadUrl(defaultUrl));

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startMenu.classList.toggle('hidden');
        });

        desktopScreen.addEventListener('click', () => startMenu.classList.add('hidden'));

        shutdownBtn.addEventListener('click', () => {
            playAudio(sndShutdown);
            startMenu.classList.add('hidden');
            setTimeout(() => {
                passwordInput.value = '';
                loginError.textContent = '';
                desktopScreen.classList.add('hidden');
                notepadWindow.classList.add('hidden');
                browserWindow.classList.add('hidden');
                playerWindow.classList.add('hidden');
                loginScreen.classList.remove('hidden');
            }, 2000);
        });

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
